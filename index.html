<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vLLM Chat</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --bg2: #161b22;
    --bg3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #58a6ff;
    --accent2: #1f6feb;
    --user-bg: #1c2a3a;
    --ai-bg: #161b22;
    --danger: #f85149;
    --success: #3fb950;
    --radius: 12px;
    --input-bg: #0d1117;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Header */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; flex: 1; }
  .header-badge {
    font-size: 11px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--text2);
  }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text2);
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 16px;
    display: flex;
    align-items: center;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: var(--bg3); color: var(--text); }

  /* Settings panel */
  #settings-panel {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: none;
    gap: 12px;
    flex-direction: column;
    flex-shrink: 0;
  }
  #settings-panel.open { display: flex; }
  .setting-row { display: flex; gap: 8px; align-items: center; }
  .setting-row label { font-size: 12px; color: var(--text2); width: 80px; flex-shrink: 0; }
  .setting-row input, .setting-row textarea, .setting-row select {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 5px 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .setting-row input:focus, .setting-row textarea:focus, .setting-row select:focus {
    border-color: var(--accent2);
  }
  .setting-row textarea { resize: vertical; min-height: 60px; }

  /* Messages */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg { display: flex; gap: 10px; max-width: 100%; }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg.user .msg-avatar { background: var(--accent2); }
  .msg.ai .msg-avatar { background: var(--bg3); border: 1px solid var(--border); }
  .msg-bubble {
    background: var(--ai-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    max-width: min(680px, 85%);
    font-size: 14px;
    line-height: 1.6;
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border-color: #1f6feb55;
  }
  .msg-bubble img.attached {
    max-width: 240px;
    max-height: 200px;
    border-radius: 8px;
    display: block;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    object-fit: cover;
  }

  /* Markdown styles inside bubble */
  .msg-bubble p { margin: 0 0 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble pre {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
  }
  .msg-bubble code {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
  }
  .msg-bubble :not(pre) > code {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 5px;
  }
  .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0; }
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 10px 0 6px; font-size: 15px; }
  .msg-bubble blockquote {
    border-left: 3px solid var(--border);
    padding-left: 10px;
    color: var(--text2);
    margin: 6px 0;
  }
  .msg-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
  .msg-bubble th, .msg-bubble td {
    border: 1px solid var(--border);
    padding: 5px 8px;
    text-align: left;
  }
  .msg-bubble th { background: var(--bg3); }

  .typing-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--text2);
    border-radius: 50%;
    animation: blink 1.2s infinite;
    margin: 0 1px;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

  .error-msg {
    color: var(--danger);
    font-size: 13px;
    padding: 8px 12px;
    background: #2d1117;
    border: 1px solid #f8514955;
    border-radius: 8px;
    align-self: center;
  }

  /* Image preview strip */
  #image-previews {
    display: flex;
    gap: 8px;
    padding: 8px 16px 0;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .preview-thumb {
    position: relative;
    width: 60px; height: 60px;
  }
  .preview-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .preview-thumb .remove-img {
    position: absolute;
    top: -6px; right: -6px;
    width: 18px; height: 18px;
    background: var(--danger);
    border: none;
    border-radius: 50%;
    color: white;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }

  /* Input area */
  #input-area {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    flex-shrink: 0;
  }
  .input-box {
    display: flex;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 8px;
    gap: 6px;
    align-items: flex-end;
    transition: border-color 0.15s;
  }
  .input-box:focus-within { border-color: var(--accent2); }
  .input-box.drag-over { border-color: var(--accent); border-style: dashed; }
  #user-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    max-height: 160px;
    min-height: 24px;
    line-height: 1.5;
    padding: 3px 4px;
  }
  #user-input::placeholder { color: var(--text2); }
  .input-actions { display: flex; gap: 4px; align-items: center; }
  .img-upload-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text2);
    padding: 4px 6px;
    border-radius: 6px;
    font-size: 18px;
    display: flex; align-items: center;
    transition: color 0.15s;
  }
  .img-upload-btn:hover { color: var(--accent); }
  #file-input { display: none; }
  .send-btn {
    background: var(--accent2);
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: var(--accent); }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: var(--bg3); color: var(--text2); cursor: not-allowed; }
  .stop-btn {
    background: var(--danger);
    border: none;
    border-radius: 8px;
    color: white;
    cursor: pointer;
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 8px;
    display: none;
  }
  .stop-btn.visible { display: block; }
  .hint {
    font-size: 11px;
    color: var(--text2);
    margin-top: 6px;
    text-align: center;
  }
  #clear-btn { font-size: 12px; }
</style>
</head>
<body>

<header>
  <h1>vLLM Chat</h1>
  <span class="header-badge" id="model-badge">Loading...</span>
  <button class="icon-btn" id="clear-btn" title="清除對話">🗑️</button>
  <button class="icon-btn" id="settings-btn" title="設定">⚙️</button>
</header>

<div id="settings-panel">
  <div class="setting-row">
    <label>API URL</label>
    <input type="text" id="api-url" value="http://localhost:8000/v1" placeholder="http://localhost:8000/v1">
  </div>
  <div class="setting-row">
    <label>Model</label>
    <input type="text" id="model-name" value="/models/gemma-4-E4B-it" placeholder="model name">
  </div>
  <div class="setting-row">
    <label>API Key</label>
    <input type="text" id="api-key" value="EMPTY" placeholder="EMPTY or your key">
  </div>
  <div class="setting-row">
    <label>System</label>
    <textarea id="system-prompt" placeholder="系統提示詞（留空則略過）"></textarea>
  </div>
</div>

<div id="messages"></div>

<div id="image-previews"></div>

<div id="input-area">
  <div class="input-box" id="input-box">
    <textarea id="user-input" placeholder="輸入訊息，Shift+Enter 換行，Enter 送出，可貼上圖片…" rows="1"></textarea>
    <div class="input-actions">
      <button class="img-upload-btn" id="img-upload-btn" title="上傳圖片">🖼️</button>
      <input type="file" id="file-input" accept="image/*" multiple>
      <button class="stop-btn" id="stop-btn">■ 停止</button>
      <button class="send-btn" id="send-btn" title="送出">▶</button>
    </div>
  </div>
  <div class="hint">Enter 送出 · Shift+Enter 換行 · 可拖拉或貼上 (Ctrl+V) 圖片</div>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let history = [];      // [{role, content}] — content may be string or array
  let pendingImages = []; // [{dataUrl, mimeType}]
  let abortCtrl = null;

  // ── Elements ───────────────────────────────────────────────────────────────
  const $messages     = document.getElementById('messages');
  const $input        = document.getElementById('user-input');
  const $sendBtn      = document.getElementById('send-btn');
  const $stopBtn      = document.getElementById('stop-btn');
  const $clearBtn     = document.getElementById('clear-btn');
  const $settingsBtn  = document.getElementById('settings-btn');
  const $settingsPanel= document.getElementById('settings-panel');
  const $imgUploadBtn = document.getElementById('img-upload-btn');
  const $fileInput    = document.getElementById('file-input');
  const $imagePreviews= document.getElementById('image-previews');
  const $inputBox     = document.getElementById('input-box');
  const $modelBadge   = document.getElementById('model-badge');
  const $apiUrl       = document.getElementById('api-url');
  const $modelName    = document.getElementById('model-name');
  const $apiKey       = document.getElementById('api-key');
  const $systemPrompt = document.getElementById('system-prompt');

  // ── Settings persistence ───────────────────────────────────────────────────
  function loadSettings() {
    const s = JSON.parse(localStorage.getItem('vllm-settings') || '{}');
    if (s.apiUrl)       $apiUrl.value       = s.apiUrl;
    if (s.modelName)    $modelName.value    = s.modelName;
    if (s.apiKey)       $apiKey.value       = s.apiKey;
    if (s.systemPrompt) $systemPrompt.value = s.systemPrompt;
    updateBadge();
  }
  function saveSettings() {
    localStorage.setItem('vllm-settings', JSON.stringify({
      apiUrl:       $apiUrl.value,
      modelName:    $modelName.value,
      apiKey:       $apiKey.value,
      systemPrompt: $systemPrompt.value,
    }));
    updateBadge();
  }
  function updateBadge() {
    const name = $modelName.value.split('/').pop() || $modelName.value;
    $modelBadge.textContent = name;
  }
  [$apiUrl, $modelName, $apiKey, $systemPrompt].forEach(el =>
    el.addEventListener('input', saveSettings)
  );

  // ── Settings toggle ────────────────────────────────────────────────────────
  $settingsBtn.addEventListener('click', () =>
    $settingsPanel.classList.toggle('open')
  );

  // ── Auto-resize textarea ───────────────────────────────────────────────────
  $input.addEventListener('input', () => {
    $input.style.height = 'auto';
    $input.style.height = Math.min($input.scrollHeight, 160) + 'px';
  });

  // ── Image handling ─────────────────────────────────────────────────────────
  function addImages(files) {
    [...files].forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => {
        pendingImages.push({ dataUrl: e.target.result, mimeType: file.type });
        renderImagePreviews();
      };
      reader.readAsDataURL(file);
    });
  }
  function renderImagePreviews() {
    $imagePreviews.innerHTML = '';
    pendingImages.forEach((img, i) => {
      const div = document.createElement('div');
      div.className = 'preview-thumb';
      div.innerHTML = `<img src="${img.dataUrl}"><button class="remove-img" data-i="${i}">✕</button>`;
      $imagePreviews.appendChild(div);
    });
    $imagePreviews.querySelectorAll('.remove-img').forEach(btn => {
      btn.addEventListener('click', () => {
        pendingImages.splice(+btn.dataset.i, 1);
        renderImagePreviews();
      });
    });
  }
  $imgUploadBtn.addEventListener('click', () => $fileInput.click());
  $fileInput.addEventListener('change', e => { addImages(e.target.files); e.target.value = ''; });

  // Paste image
  document.addEventListener('paste', e => {
    const items = [...(e.clipboardData?.items || [])];
    const imgs = items.filter(i => i.type.startsWith('image/'));
    if (imgs.length) addImages(imgs.map(i => i.getAsFile()));
  });

  // Drag & drop
  $inputBox.addEventListener('dragover', e => { e.preventDefault(); $inputBox.classList.add('drag-over'); });
  $inputBox.addEventListener('dragleave', () => $inputBox.classList.remove('drag-over'));
  $inputBox.addEventListener('drop', e => {
    e.preventDefault();
    $inputBox.classList.remove('drag-over');
    addImages(e.dataTransfer.files);
  });

  // ── Message rendering ──────────────────────────────────────────────────────
  function appendMessage(role, contentOrHtml, isHtml = false) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'user' ? '👤' : '🤖';
    div.innerHTML = `
      <div class="msg-avatar">${avatar}</div>
      <div class="msg-bubble" data-role="${role}"></div>`;
    const bubble = div.querySelector('.msg-bubble');
    if (isHtml) {
      bubble.innerHTML = contentOrHtml;
    } else {
      bubble.textContent = contentOrHtml;
    }
    $messages.appendChild(div);
    scrollToBottom();
    return bubble;
  }

  function appendUserMessage(text, images) {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="msg-avatar">👤</div><div class="msg-bubble"></div>`;
    const bubble = div.querySelector('.msg-bubble');
    if (images.length) {
      images.forEach(img => {
        const el = document.createElement('img');
        el.src = img.dataUrl;
        el.className = 'attached';
        bubble.appendChild(el);
      });
    }
    if (text) {
      const p = document.createElement('p');
      p.textContent = text;
      bubble.appendChild(p);
    }
    $messages.appendChild(div);
    scrollToBottom();
  }

  function appendTyping() {
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typing-indicator';
    div.innerHTML = `<div class="msg-avatar">🤖</div>
      <div class="msg-bubble">
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
        <span class="typing-dot"></span>
      </div>`;
    $messages.appendChild(div);
    scrollToBottom();
    return div;
  }

  function removeTyping() {
    document.getElementById('typing-indicator')?.remove();
  }

  function showError(msg) {
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = `⚠️ ${msg}`;
    $messages.appendChild(div);
    scrollToBottom();
  }

  function scrollToBottom() {
    $messages.scrollTop = $messages.scrollHeight;
  }

  // ── Build API messages array ───────────────────────────────────────────────
  function buildMessages(userText, images) {
    const msgs = [];
    const sys = $systemPrompt.value.trim();
    if (sys) msgs.push({ role: 'system', content: sys });
    msgs.push(...history);

    // Build user content (multimodal if images present)
    if (images.length) {
      const content = [];
      images.forEach(img => {
        content.push({
          type: 'image_url',
          image_url: { url: img.dataUrl }
        });
      });
      if (userText) content.push({ type: 'text', text: userText });
      msgs.push({ role: 'user', content });
    } else {
      msgs.push({ role: 'user', content: userText });
    }
    return msgs;
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = $input.value.trim();
    const images = [...pendingImages];
    if (!text && !images.length) return;

    // Render user bubble
    appendUserMessage(text, images);

    // Save to history (text only for future context; images kept in this turn)
    const userHistoryContent = images.length
      ? [ ...images.map(i => ({ type: 'image_url', image_url: { url: i.dataUrl } })),
          ...(text ? [{ type: 'text', text }] : []) ]
      : text;
    history.push({ role: 'user', content: userHistoryContent });

    // Clear input
    $input.value = '';
    $input.style.height = 'auto';
    pendingImages = [];
    renderImagePreviews();

    // UI state
    $sendBtn.disabled = true;
    $stopBtn.classList.add('visible');
    const typingEl = appendTyping();

    abortCtrl = new AbortController();
    let aiText = '';
    let aiBubble = null;

    try {
      const apiBase = $apiUrl.value.replace(/\/$/, '');
      const res = await fetch(`${apiBase}/chat/completions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${$apiKey.value || 'EMPTY'}`,
        },
        body: JSON.stringify({
          model: $modelName.value,
          messages: buildMessages(text, images),
          stream: true,
          temperature: 0.7,
        }),
        signal: abortCtrl.signal,
      });

      if (!res.ok) {
        const errBody = await res.text();
        throw new Error(`HTTP ${res.status}: ${errBody.slice(0, 200)}`);
      }

      removeTyping();
      aiBubble = appendMessage('ai', '');

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || trimmed === 'data: [DONE]') continue;
          if (!trimmed.startsWith('data: ')) continue;
          try {
            const json = JSON.parse(trimmed.slice(6));
            const delta = json.choices?.[0]?.delta?.content;
            if (delta) {
              aiText += delta;
              aiBubble.innerHTML = marked.parse(aiText);
              scrollToBottom();
            }
          } catch { /* partial JSON, ignore */ }
        }
      }

      // Final render
      if (aiBubble) aiBubble.innerHTML = marked.parse(aiText);
      history.push({ role: 'assistant', content: aiText });

    } catch (err) {
      removeTyping();
      if (err.name === 'AbortError') {
        if (aiBubble && aiText) {
          history.push({ role: 'assistant', content: aiText });
        }
      } else {
        showError(err.message);
        // remove incomplete user message from history
        history.pop();
      }
    } finally {
      abortCtrl = null;
      $sendBtn.disabled = false;
      $stopBtn.classList.remove('visible');
      scrollToBottom();
    }
  }

  // ── Stop ───────────────────────────────────────────────────────────────────
  $stopBtn.addEventListener('click', () => abortCtrl?.abort());

  // ── Clear ──────────────────────────────────────────────────────────────────
  $clearBtn.addEventListener('click', () => {
    history = [];
    $messages.innerHTML = '';
    pendingImages = [];
    renderImagePreviews();
  });

  // ── Keyboard ───────────────────────────────────────────────────────────────
  $input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  $sendBtn.addEventListener('click', sendMessage);

  // ── Init ───────────────────────────────────────────────────────────────────
  loadSettings();
  $input.focus();
</script>
</body>
</html>
